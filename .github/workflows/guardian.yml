# Guardian — frontend-local variant.
#
# The banxe-repo-template guardian.yml proxied all validation to an
# evo1-hosted Guardian service via Tailscale VPN.  That service has no
# frontend-specific rules and the VPN dependency is meaningless here,
# so this workflow replaces the remote call with local structural
# checks appropriate for a frontend repository.
#
# When a shared Guardian service gains frontend-aware rules, this
# workflow can be pointed back at it (see banxe-architecture ADR-056).

name: Guardian

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  guardian:
    name: guardian-${{ matrix.family }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        family: [factory, project]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate (factory)
        if: matrix.family == 'factory'
        run: |
          set -euo pipefail
          echo "--- factory gate: required config files ---"
          test -f .claude/settings.json || { echo "::error::Missing .claude/settings.json"; exit 1; }
          python3 -c "import json; json.load(open('.claude/settings.json'))" \
            || { echo "::error::.claude/settings.json is not valid JSON"; exit 1; }
          test -f .github/workflows/claude.yml || { echo "::error::Missing .github/workflows/claude.yml"; exit 1; }
          echo "factory gate passed"

      - name: Validate (project)
        if: matrix.family == 'project'
        run: |
          set -euo pipefail
          echo "--- project gate: FSD structure + package.json ---"
          test -f package.json || { echo "::error::Missing package.json"; exit 1; }
          for layer in app pages widgets features entities shared; do
            test -d "src/$layer" || { echo "::error::Missing FSD layer src/$layer"; exit 1; }
          done
          echo "project gate passed"
